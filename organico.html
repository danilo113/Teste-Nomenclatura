<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Estruturas Orgânicas - Modos Duplos</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            box-sizing: border-box;
        }
        .app-container {
            background-color: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%;
            max-width: 450px; text-align: center;
        }
        
        /* Estilos do Menu de Modos */
        .menu-modos {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 25px;
        }
        .btn-modo {
            flex: 1; padding: 10px; border: 2px solid #007bff; border-radius: 8px;
            background-color: white; color: #007bff; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-modo.ativo {
            background-color: #007bff; color: white;
        }

        h2 { color: #333; font-size: 1.2rem; margin-bottom: 20px; min-height: 28px; }
        
        #imagem-molecula {
            width: 500px; height: 500px; object-fit: contain;
            margin: 10px auto 20px auto; background-color: #fff; display: block;
        }
        
        /* Estilo para botões de texto (Modo 1) */
        .btn-opcao-texto {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            font-size: 1rem; color: white; background-color: #007bff;
            border: none; border-radius: 8px; cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-opcao-texto:hover { background-color: #0056b3; }
        .btn-opcao-texto:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Estilo para botões de imagem (Modo 2) */
        .grid-imagens {
            display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px;
        }
        .btn-opcao-img {
            width: 48%; padding: 10px; background-color: white;
            border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer;
            transition: 0.2s; box-sizing: border-box; display: flex;
            align-items: center; justify-content: center;
        }
        .btn-opcao-img:hover { border-color: #007bff; }
        .btn-opcao-img img {
            width: 100%; height: 120px; object-fit: contain;
        }
        .btn-opcao-img:disabled { border-color: #ccc; opacity: 0.6; cursor: not-allowed; }

        #mensagem { margin-top: 20px; font-weight: bold; min-height: 25px; }
        .sucesso { color: #28a745; } .erro { color: #dc3545; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="menu-modos">
            <button id="btn-modo-1" class="btn-modo ativo" onclick="mudarModo(1)">Adivinhar Nome</button>
            <button id="btn-modo-2" class="btn-modo" onclick="mudarModo(2)">Adivinhar Estrutura</button>
        </div>

        <h2 id="titulo-pergunta">Qual é o nome desta estrutura?</h2>
        
        <img id="imagem-molecula" src="" alt="Estrutura Molecular">

        <div id="botoes-container"></div>
        <div id="mensagem"></div>
    </div>

    <script>
        const listaDeCompostos = [
            { nome: "Ácido Fórmico", smiles: "C(=O)O" },
            { nome: "Ácido Acético", smiles: "CC(=O)O" },
            { nome: "Ácido Carbônico", smiles: "C(=O)(O)O" },
            { nome: "Ácido Malônico", smiles: "O=C(O)CC(=O)O" },
            { nome: "Ácido Succínico", smiles: "O=C(O)CCC(=O)O" },
            { nome: "Ácido Fumárico", smiles: "O=C(O)/C=C/C(=O)O" },
            { nome: "Ácido Maleico", smiles: "O=C(O)/C=C\\C(=O)O" },
            { nome: "Ácido Oxálico", smiles: "O=C(O)C(=O)O" },
            { nome: "Ácido Tartárico", smiles: "O=C(O)C(O)C(O)C(=O)O" },
            { nome: "Ácido Glutárico", smiles: "O=C(O)CCCC(=O)O" },
            { nome: "Ácido Salicílico", smiles: "O=C(O)c1ccccc1O" },
            { nome: "Ácido Benzóico", smiles: "O=C(O)c1ccccc1" },
            { nome: "Ácido Acrílico", smiles: "C=CC(=O)O" },
            { nome: "Ácido Pícrico", smiles: "Oc1c(cc(cc1[N+]([O-])=O)[N+]([O-])=O)[N+]([O-])=O" },
            { nome: "Fenol", smiles: "Oc1ccccc1" },
            { nome: "Glicerol", smiles: "OCC(O)CO" },
            { nome: "Etileno Glicol", smiles: "OCCO" },
            { nome: "Hidroquinona", smiles: "Oc1ccc(O)cc1" },
            { nome: "p-Cresol", smiles: "Cc1ccc(O)cc1" },
            { nome: "Resorcinol", smiles: "Oc1cccc(O)c1" },
            { nome: "Tolueno", smiles: "Cc1ccccc1" },
            { nome: "Anilina", smiles: "Nc1ccccc1" },
            { nome: "Isopreno", smiles: "CC(=C)C=C" },
            { nome: "Etanol", smiles: "CCO" }, 
            { nome: "Ureia", smiles: "NC(=O)N" },
            { nome: "Hidrazina", smiles: "NN" },
            { nome: "Quinona", smiles: "O=C1C=CC(=O)C=C1" },
            { nome: "Propanona", smiles: "CC(=O)C" }, 
            { nome: "t-Butil Mercaptana", smiles: "CC(C)(C)S" },
            { nome: "Xileno", smiles: "Cc1ccccc1C" },
            { nome: "Eteno", smiles: "C=C" },
            { nome: "Pirrol", smiles: "c1cc[nH]c1" },
            { nome: "Furano", smiles: "c1ccoc1" },
            { nome: "Piridina", smiles: "c1ccncc1" },
            { nome: "Benzeno", smiles: "c1ccccc1" },
            { nome: "Acetileno", smiles: "C#C" },
            { nome: "Antraceno", smiles: "c1ccc2cc3ccccc3cc2c1" },
            { nome: "Naftaleno", smiles: "c1ccc2ccccc2c1" },
            { nome: "Fenantreno", smiles: "c1ccc2c(c1)ccc3ccccc32" },
            { nome: "Gama-Butirolactona", smiles: "O=C1CCCO1" },
            { nome: "Gama-Butirolactama", smiles: "O=C1CCCN1" },
            { nome: "Glicose", smiles: "C(C1C(C(C(C(O1)O)O)O)O)O" },
            { nome: "Peróxido de Benzoíla", smiles: "O=C(OOC(=O)c1ccccc1)c1ccccc1" },
            { nome: "Cumeno", smiles: "CC(C)c1ccccc1" }
        ];

        let compostoAtual = null;
        let modoAtual = 1; // 1 = Adivinhar Nome, 2 = Adivinhar Estrutura

        function embaralhar(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function sortearComposto() {
            let novo = listaDeCompostos[Math.floor(Math.random() * listaDeCompostos.length)];
            while (compostoAtual && novo.nome === compostoAtual.nome) {
                novo = listaDeCompostos[Math.floor(Math.random() * listaDeCompostos.length)];
            }
            return novo;
        }

        function mudarModo(novoModo) {
            modoAtual = novoModo;
            
            // Atualiza os botões do menu
            document.getElementById('btn-modo-1').className = modoAtual === 1 ? 'btn-modo ativo' : 'btn-modo';
            document.getElementById('btn-modo-2').className = modoAtual === 2 ? 'btn-modo ativo' : 'btn-modo';
            
            carregarQuiz();
        }

        function carregarQuiz() {
            const divMensagem = document.getElementById('mensagem');
            divMensagem.innerText = "";
            divMensagem.className = "";

            compostoAtual = sortearComposto();
            
            // Separa 1 opção certa e 3 opções erradas completas (nome + smiles)
            let outrasOpcoes = embaralhar(listaDeCompostos.filter(c => c.nome !== compostoAtual.nome)).slice(0, 3);
            let opcoesFinais = embaralhar([compostoAtual, ...outrasOpcoes]);

            const divBotoes = document.getElementById('botoes-container');
            const imgPrincipal = document.getElementById('imagem-molecula');
            const titulo = document.getElementById('titulo-pergunta');
            
            divBotoes.innerHTML = ""; 

            if (modoAtual === 1) {
                // MODO 1: Mostra a Imagem e pergunta o Nome
                imgPrincipal.style.display = 'block';
                divBotoes.className = '';
                titulo.innerText = "Qual é o nome desta estrutura?";
                
                const smilesCodificado = encodeURIComponent(compostoAtual.smiles);
                imgPrincipal.src = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/${smilesCodificado}/PNG?record_type=2d&image_size=large`;

                opcoesFinais.forEach(opcao => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-opcao-texto';
                    btn.innerText = opcao.nome;
                    btn.onclick = () => verificarResposta(opcao.nome);
                    divBotoes.appendChild(btn);
                });

            } else {
                // MODO 2: Mostra o Nome e pergunta a Imagem
                imgPrincipal.style.display = 'none';
                divBotoes.className = 'grid-imagens';
                titulo.innerText = `Qual destas estruturas é o(a) ${compostoAtual.nome}?`;

                opcoesFinais.forEach(opcao => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-opcao-img';
                    
                    const img = document.createElement('img');
                    const smilesCod = encodeURIComponent(opcao.smiles);
                    img.src = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/${smilesCod}/PNG?record_type=2d&image_size=small`;
                    img.alt = "Opção de Estrutura";

                    btn.appendChild(img);
                    btn.onclick = () => verificarResposta(opcao.nome);
                    divBotoes.appendChild(btn);
                });
            }
        }

        function verificarResposta(nomeSelecionado) {
            const divMensagem = document.getElementById('mensagem');
            const botoes = document.querySelectorAll('#botoes-container button');
            
            botoes.forEach(btn => btn.disabled = true);

            if (nomeSelecionado === compostoAtual.nome) {
                divMensagem.innerText = "Acertou! Carregando o próximo...";
                divMensagem.className = "sucesso";
                setTimeout(carregarQuiz, 1500);
            } else {
                divMensagem.innerText = "Incorreto. Tente novamente!";
                divMensagem.className = "erro";
                botoes.forEach(btn => btn.disabled = false);
            }
        }

        window.onload = carregarQuiz;
    </script>
</body>
</html>
